<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personal OS API</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #000000;
      --bg-mid: #0a0a0a;
      --white: #ffffff;
      --dim: rgba(255,255,255,0.35);
      --line: rgba(255,255,255,0.08);
      --accent: #e0e0e0;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg-deep);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* Layered gradient background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,255,255,0.04) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255,255,255,0.03) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 10% 80%, rgba(255,255,255,0.02) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Noise grain overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 1;
    }

    /* Thin horizontal rule lines */
    .grid-lines {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(to bottom, var(--line) 1px, transparent 1px);
      background-size: 100% 80px;
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      height: 100vh;
      padding: 0 10vw;
    }

    .badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dim);
      border: 1px solid var(--line);
      padding: 0.35em 0.85em;
      display: inline-block;
      margin-bottom: 2.8rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3rem, 8vw, 7rem);
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: var(--white);
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.45s;
    }

    h1 span {
      display: block;
      color: var(--dim);
      font-weight: 400;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: rgba(255,255,255,0.25);
      margin: 2.4rem 0;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.7s;
    }

    .meta {
      display: flex;
      gap: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.9s;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .meta-label {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .meta-value {
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 300;
    }

    /* status dot */
    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      margin-right: 0.5em;
      box-shadow: 0 0 6px #4ade80aa;
      animation: pulse 2.4s ease-in-out infinite;
    }

    .corner-mark {
      position: fixed;
      bottom: 2.4rem;
      right: 10vw;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--dim);
      text-transform: uppercase;
      z-index: 2;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 1.1s;
    }

    .corner-mark-left {
      position: fixed;
      bottom: 2.4rem;
      left: 10vw;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--dim);
      z-index: 2;
      font-family: 'DM Mono', monospace;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 1.1s;
    }

    /* top-right corner index */
    .top-right {
      position: fixed;
      top: 2.4rem; right: 10vw;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: var(--dim);
      z-index: 2;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.1s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="grid-lines"></div>

  <div class="top-right">v1.0.0 &nbsp;/&nbsp; REST</div>

  <main>
    <div class="badge">Personal OS &nbsp;·&nbsp; API</div>

    <h1>
      Personal<br/>
      <span>OS API</span>
    </h1>

    <div class="divider"></div>

    <div class="meta">
      <div class="meta-item">
        <span class="meta-label">Status</span>
        <span class="meta-value"><span class="dot"></span>Operational</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Base URL</span>
        <span class="meta-value">/api/v1</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Auth</span>
        <span class="meta-value">Bearer Token</span>
      </div>
    </div>
  </main>

  <span class="corner-mark-left">© 2026</span>
  <span class="corner-mark">personal-os.api</span>
</body>
</html>
